spring.application.name=utility
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sysmonitor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:roman}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update  
spring.jpa.show-sql=false            
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.datasource.initialization-mode=always
spring.datasource.hikari.maximum-pool-size=10
spring.flyway.enabled=false

spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

admin.email=${ADMIN_EMAIL:admin@innaesim.com}
admin.password=${ADMIN_PASSWORD:password}
admin.role=${ADMIN_ROLE:admin}
secret.jwt=${JWT_SECRET:u4FgxGbXJbwCkNgh7pYvLTMZG9m6Rkgc4iibtsfLE5CPK7n64Rj2vz9CAdPljUWv}
server.port=${SERVER_PORT:8085}
